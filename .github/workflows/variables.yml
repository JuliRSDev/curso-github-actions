name: Saludo usando variables
run-name: ¡Estoy aprendiendo a usar Variables!
on:
  workflow_dispatch
env:
  DIA_DE_SEMANA: Domingo
jobs:
  saludo-variables:
    runs-on: ubuntu-latest
    env:
      SALUDO: Hola
    steps:
      - name: Saludar
        run: echo "$SALUDO, ${{ vars.MY_NOMBRE }}. Hoy es $DIA_DE_SEMANA, $DESEO!"
        env:
          DESEO: "Feliz día"



